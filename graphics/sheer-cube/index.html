<!DOCTYPE html>
<html>

<head>
    <title>Three.js GLSL Shear</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div id="controls">
        <label>
            Shear:
            <span id="shearValue">0</span>
        </label>

        <br>

        <input
            id="shearSlider"
            type="range"
            min="-2"
            max="2"
            step="0.01"
            value="0">
    </div>

    <script type="module" src="main.js"></script>

</body>

</html>
